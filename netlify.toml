# =============================================
# NETLIFY CONFIGURATION — Plunge, a Plumbing Co. LLC
# =============================================
# Netlify reads this file AUTOMATICALLY the moment this repository is
# connected — no dashboard settings needed for the items below. This file
# exists so the publish-folder rule cannot be forgotten on Netlify day.
#
# THE CRITICAL LINE ("Website Folder Review" report, Finding 2, July 2026):
# publish ONLY docs/. The repo root holds private working files —
# _generator/ (page templates, generator script, internal notes and copy
# strategy), .claude/, and planning docs — which must NEVER be deployed.
# Everything inside docs/ is public; everything outside it stays private.
#
# (GitHub Pages, used as the test environment, has its own equivalent
# setting: repo Settings > Pages > serve from the /docs folder.)
# =============================================

[build]
  publish = "docs"

  # No build command on purpose: the site is committed pre-built (pages are
  # generated locally with `python3 _generator/generate.py` and the output
  # in docs/ is uploaded ready to serve). If we ever want Netlify to run the
  # generator itself on every push, add here:
  #   command = "python3 _generator/generate.py"

# When the booking form's ServiceTitan backend gets built (a Netlify
# Function at /api/book-servicetitan — see js/script.js SERVICETITAN
# comment), its config will be added here.
